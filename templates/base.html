<!DOCTYPE html>
<html>
<head>
<style>
body { margin:0; font-family:sans-serif; background:#f4f6f9;}
.sidebar {
    width:200px; height:100vh; background:#1e293b; color:white; position:fixed;
}
.sidebar a {
    display:block; padding:15px; color:#cbd5e1; text-decoration:none;
}
.sidebar a:hover { background:#334155; color:white;}
.main {
    margin-left:200px; padding:30px;
}
.card {
    background:white; padding:20px; border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    margin-bottom:20px;
}
.skill {
    display:inline-block; padding:6px 12px;
    margin:4px; border-radius:20px; background:#dbeafe;
}
.missing { background:#fecaca; }
</style>
</head>
<body>

<div class="sidebar">
    <h3 style="padding:15px;">Analyzer</h3>
    <a href="/dashboard">Dashboard</a>
    <a href="/history">History</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">
{% block content %}{% endblock %}
</div>

</body>
</html>
