<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }

.nav {
    background:#1e293b;
    padding:15px;
}
.nav a {
    color:white;
    margin-right:15px;
    text-decoration:none;
}

.container {
    padding:30px;
}

.card {
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.skill {
    display:inline-block;
    padding:6px 12px;
    margin:5px;
    border-radius:20px;
    background:#dbeafe;
}

.missing {
    background:#fecaca;
}
</style>
</head>

<body>

<div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/history">History</a>
    <a href="/logout">Logout</a>
</div>

<div class="container">

<div class="card">
<h2>Resume Analyzer</h2>

<form method="POST" enctype="multipart/form-data">
<input type="file" name="resume" required><br><br>

<textarea name="job" placeholder="Paste job description" style="width:100%;height:100px;" required></textarea>
<br><br>

<button type="submit">Analyze</button>
</form>
</div>

{% if score %}
<div class="card">

<h3>Match Score: {{score}}%</h3>

<div style="background:#eee;border-radius:10px;">
<div style="width:{{score}}%;background:#3b82f6;color:white;padding:5px;border-radius:10px;">
{{score}}%
</div>
</div>

<h4>Matched Skills</h4>
{% for s in matched %}
<span class="skill">{{s}}</span>
{% endfor %}

<h4>Missing Skills</h4>
{% for s in missing %}
<span class="skill missing">{{s}}</span>
{% endfor %}

</div>
{% endif %}

</div>

</body>
</html>
